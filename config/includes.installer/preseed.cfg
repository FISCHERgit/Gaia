# Gaia Linux Preseed Configuration (KDE Plasma 6 / Trixie)
# Branding and defaults for the Debian Installer

# Branding
d-i debian-installer/splash boolean true
d-i base-installer/kernel/override-image string linux-image-amd64

# Locale and keyboard
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

# Network
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string gaia
d-i netcfg/get_domain string local

# Mirror (use default Debian mirrors)
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

# Clock and timezone
d-i clock-setup/utc boolean true
d-i time/zone string Europe/Berlin

# Partitioning - let user choose interactively
# No auto-partition settings = installer shows full partition menu

# Default user config
d-i passwd/root-login boolean true
d-i passwd/make-user boolean true
d-i passwd/user-default-groups string users sudo cdrom floppy audio dip video plugdev netdev bluetooth

# Package selection - kde-desktop tasksel installs full Plasma
tasksel tasksel/first multiselect standard, kde-desktop

# Additional packages
d-i pkgsel/include string sddm konsole dolphin kate firefox-esr \
    network-manager pipewire pipewire-pulse wireplumber \
    zsh alacritty htop fastfetch git curl wget \
    breeze-gtk-theme breeze-icon-theme fonts-noto fonts-hack \
    xserver-xorg-video-all xserver-xorg-input-all dbus-x11 \
    plymouth grub-efi-amd64 efibootmgr

# No popularity-contest
popularity-contest popularity-contest/participate boolean false

# GRUB bootloader
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean true
d-i grub-installer/bootdev string default

# Post-installation: apply Gaia branding, GRUB theme, enable SDDM
d-i preseed/late_command string \
    echo "gaia" > /target/etc/hostname; \
    printf 'PRETTY_NAME="Gaia Linux"\nNAME="Gaia"\nID=gaia\nID_LIKE=debian\nVERSION_CODENAME=trixie\nHOME_URL="https://github.com/gaialinux"\n' > /target/etc/os-release; \
    in-target sed -i 's|DSHELL=/bin/bash|DSHELL=/bin/zsh|' /etc/default/useradd || true; \
    mkdir -p /target/etc/sddm.conf.d; \
    printf '[Theme]\nCurrent=breeze\n' > /target/etc/sddm.conf.d/gaia.conf; \
    in-target systemctl set-default graphical.target; \
    in-target systemctl enable sddm; \
    in-target systemctl disable gdm3 || true; \
    in-target systemctl disable lightdm || true; \
    mkdir -p /target/boot/grub/themes/gaia; \
    cp /cdrom/boot/grub/themes/gaia/* /target/boot/grub/themes/gaia/ || \
    cp /live/medium/boot/grub/themes/gaia/* /target/boot/grub/themes/gaia/ || true; \
    sed -i '/GRUB_THEME/d' /target/etc/default/grub; \
    printf 'GRUB_THEME=/boot/grub/themes/gaia/theme.txt\nGRUB_TIMEOUT=3\nGRUB_GFXMODE=auto\nGRUB_GFXPAYLOAD_LINUX=keep\n' >> /target/etc/default/grub; \
    in-target update-grub || true; \
    rm -f /target/usr/share/applications/gaia-installer.desktop; \
    rm -f /target/usr/share/applications/calamares.desktop; \
    rm -f /target/usr/share/applications/debian-installer-launcher.desktop; \
    rm -f /target/etc/skel/Desktop/gaia-installer.desktop; \
    rm -f /target/usr/local/bin/gaia-autoinstall.sh; \
    rm -f /target/etc/skel/.config/autostart/gaia-autoinstall.desktop; \
    in-target apt-get remove --purge -y calamares calamares-settings-debian || true; \
    in-target apt-get autoremove -y || true

# Finish - reboot after install
d-i finish-install/reboot_in_progress note
