set timeout=10
set default=0

insmod all_video
insmod gfxterm
insmod png

if loadfont /boot/grub/fonts/unicode.pf2 ; then
    set gfxmode=auto
    terminal_output gfxterm
fi

if [ -f /boot/grub/themes/gaia/theme.txt ]; then
    set theme=/boot/grub/themes/gaia/theme.txt
fi

# Find kernel and initrd (live-build names vary)
search --set=root --file /live/vmlinuz
if [ -f /live/vmlinuz ]; then
    set KERNEL=/live/vmlinuz
    set INITRD=/live/initrd.img
fi
if [ -f /live/vmlinuz-* ]; then
    for k in /live/vmlinuz-*; do
        set KERNEL="$k"
    done
    for i in /live/initrd.img-*; do
        set INITRD="$i"
    done
fi

menuentry "Gaia Linux - Live Session" --class gaia --class linux {
    linux $KERNEL boot=live components quiet splash
    initrd $INITRD
}

menuentry "Gaia Linux - Install" --class gaia --class linux {
    linux $KERNEL boot=live components quiet splash autoinstall
    initrd $INITRD
}

menuentry "Gaia Linux - Live (Safe Graphics)" --class gaia --class linux {
    linux $KERNEL boot=live components quiet splash nomodeset
    initrd $INITRD
}
