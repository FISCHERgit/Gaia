set timeout=5
set default=0

insmod all_video
insmod gfxterm
insmod png

if loadfont /boot/grub/fonts/unicode.pf2 ; then
    set gfxmode=auto
    terminal_output gfxterm
fi

if [ -f /boot/grub/themes/gaia/theme.txt ]; then
    set theme=/boot/grub/themes/gaia/theme.txt
fi

menuentry "Gaia Linux - Live Session" --class gaia --class linux {
    linux /live/vmlinuz boot=live components quiet splash
    initrd /live/initrd
}

menuentry "Gaia Linux - Install (Graphical)" --class gaia --class linux {
    linux /install/gtk/vmlinuz vga=788 --- quiet
    initrd /install/gtk/initrd.gz
}

menuentry "Gaia Linux - Install (Text)" --class gaia --class linux {
    linux /install/vmlinuz vga=788 --- quiet
    initrd /install/initrd.gz
}

menuentry "Gaia Linux - Live (Safe Graphics)" --class gaia --class linux {
    linux /live/vmlinuz boot=live components quiet splash nomodeset
    initrd /live/initrd
}
