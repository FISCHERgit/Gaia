[window]
padding = { x = 12, y = 12 }
opacity = 0.92
decorations = "None"

[font]
size = 12.0

[font.normal]
family = "Noto Sans Mono"
style = "Regular"

[font.bold]
style = "Bold"

# Gaia Lime Green Dark Theme
[colors.primary]
background = "#1a1c12"
foreground = "#e8e4d8"

[colors.cursor]
text = "#1a1c12"
cursor = "#d4e500"

[colors.vi_mode_cursor]
text = "#1a1c12"
cursor = "#c8c4b0"

[colors.selection]
text = "#e8e4d8"
background = "#3b3d28"

[colors.normal]
black   = "#1a1c12"
red     = "#f87171"
green   = "#c4d600"
yellow  = "#fbbf24"
blue    = "#6b9e1a"
magenta = "#d4e500"
cyan    = "#22d3ee"
white   = "#e8e4d8"

[colors.bright]
black   = "#2d2e1e"
red     = "#fca5a5"
green   = "#d4e500"
yellow  = "#fcd34d"
blue    = "#a8b800"
magenta = "#c8c4b0"
