print_info() {
    info title
    info underline
    info "OS" distro
    info "Host" model
    info "Kernel" kernel
    info "Uptime" uptime
    info "Packages" packages
    info "Shell" shell
    info "DE" de
    info "WM" wm
    info "Theme" theme
    info "Icons" icons
    info "Terminal" term
    info "CPU" cpu
    info "Memory" memory
    info cols
}

image_backend="ascii"
image_source="/etc/gaia-ascii.txt"
ascii_colors=(5 6 0 7 13 14)
bold="on"
separator=" >"
